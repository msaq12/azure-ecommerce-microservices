trigger:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: GitHub-Sync-Secrets
  - name: GITHUB_REPO
    value: "msaq12/azure-ecommerce-microservices"
  - name: SERVICE_FOLDER
    value: "infrastructure"

stages:
  - stage: Sync
    displayName: "Sync Infrastructure to GitHub"
    jobs:
      - job: SyncJob
        displayName: "Sync to GitHub"
        steps:
          - checkout: self
            persistCredentials: true

          - script: |
              git config --global user.email "pipeline@devops.com"
              git config --global user.name "Azure DevOps Pipeline"

              git clone https://$(GITHUB_PAT)@github.com/$(GITHUB_REPO).git github-combined
              cd github-combined

              rm -rf $(SERVICE_FOLDER)
              mkdir $(SERVICE_FOLDER)

              rsync -av --exclude='.git' \
                        --exclude='github-combined' \
                        --exclude='.gitignore' \
                        --exclude='kubernetes/order-service-secret.yaml' \
                        $(Build.SourcesDirectory)/ $(SERVICE_FOLDER)/

              git add .
              git diff --cached --quiet || (git commit -m "Sync $(SERVICE_FOLDER) from Azure DevOps - Build $(Build.BuildNumber)" && git push)
            displayName: "Sync to GitHub combined repo"
            env:
              GITHUB_PAT: $(GITHUB_PAT)
